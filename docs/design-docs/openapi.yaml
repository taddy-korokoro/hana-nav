openapi: 3.1.0

info:
  title: hana-nav API
  version: 0.1.0
  description: |
    hana-nav（花畑スポット検索サービス）の Route Handler API 仕様。

    ## 認証

    Supabase Auth のセッション Cookie でユーザーを識別する。詳細は [`docs/specs/supabase-auth.md`](../specs/supabase-auth.md) 参照。

    ## AI 花判定のレート制限

    - 匿名ユーザー: 1 回/日
    - ログインユーザー: 3 回/日
    - 報酬解放（`reward_unlocked = true`）が付与された利用ログ 1 件につき、上限に +5 回加算
  contact:
    name: hana-nav 開発チーム
  license:
    name: Proprietary

servers:
  - url: https://hana-nav.netlify.app
    description: 本番環境（Netlify）
  - url: http://localhost:3000
    description: ローカル開発環境

tags:
  - name: Public
    description: 認証不要の公開エンドポイント
  - name: AI
    description: AI 花判定（レート制限あり）
  - name: User
    description: ログインユーザー向け
  - name: Admin
    description: 管理者向け

security:
  - cookieAuth: []

paths:
  # ============================================================
  # 公開エンドポイント
  # ============================================================

  /api/spots/{id}:
    get:
      tags: [Public]
      summary: スポット詳細取得
      description: スポットの詳細情報（スポット画像・花構成・レビュー・レビュー集計・関連スポット）を返却
      security: []
      parameters:
        - $ref: '#/components/parameters/SpotIdPath'
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'public, s-maxage=60, stale-while-revalidate=300'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpotDetailBundle'
        '404':
          description: 対象スポットが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: spot_not_found
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/flowers:
    get:
      tags: [Public]
      summary: 花マスター一覧取得
      description: 花マスターを全件返却
      security: []
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'public, s-maxage=60, stale-while-revalidate=300'
          content:
            application/json:
              schema:
                type: object
                required: [flowers]
                properties:
                  flowers:
                    type: array
                    description: 花マスター一覧
                    items:
                      $ref: '#/components/schemas/FlowerListItem'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/flowers/{id}:
    get:
      tags: [Public]
      summary: 花詳細取得
      description: 花の詳細情報（花マスター・別名・花画像・関連スポット）を返却
      security: []
      parameters:
        - $ref: '#/components/parameters/FlowerIdPath'
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'public, s-maxage=60, stale-while-revalidate=300'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowerDetailBundle'
        '404':
          description: 対象の花が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: flower_not_found
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/prefectures:
    get:
      tags: [Public]
      summary: 都道府県マスター取得
      description: 47 都道府県を地方区分の情報付きで返却
      security: []
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'public, s-maxage=3600, stale-while-revalidate=86400'
          content:
            application/json:
              schema:
                type: object
                required: [prefectures]
                properties:
                  prefectures:
                    type: array
                    description: 都道府県一覧
                    items:
                      $ref: '#/components/schemas/Prefecture'
        default:
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # AI 花判定
  # ============================================================

  /api/ai/identify-flower:
    get:
      tags: [AI]
      summary: AI 花判定のレート制限状態を取得
      description: |
        本日の消費数・上限・残回数を返却

        ※ 判定リクエスト前の UI 表示用
      security: []
      parameters:
        - name: anonId
          in: query
          description: 匿名ユーザー識別子。ログイン時は無視される。
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'private, no-store'
          content:
            application/json:
              schema:
                type: object
                required: [authenticated, used, limit, remaining]
                properties:
                  authenticated:
                    type: boolean
                    description: 認証状態
                  used:
                    type: integer
                    description: 本日の消費数
                  limit:
                    type: integer
                    description: 本日の上限
                  remaining:
                    type: integer
                    description: 残回数
              example:
                authenticated: false
                used: 0
                limit: 1
                remaining: 1
        default:
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [AI]
      summary: 画像から花を判定
      description: |
        画像から花情報と関連スポットを返却

        ※ 未ログイン時は匿名ユーザー識別子（anonId）が必須<br>
        ※ 画像は 5MB 以下
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: 判定対象画像（最大 5MB）
                anonId:
                  type: string
                  format: uuid
                  description: 匿名ユーザー識別子。未ログイン時のみ必須。
      responses:
        '200':
          description: 判定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentifyFlowerResponse'
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidFormData:
                  value:
                    error: invalid_form_data
                imageRequired:
                  value:
                    error: image_required
                anonIdRequired:
                  value:
                    error: anon_id_required
        '413':
          description: 画像サイズ超過（5MB 超）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: image_too_large
        '429':
          description: 本日のレート制限に到達
          content:
            application/json:
              schema:
                type: object
                required: [error, message, remaining, limit]
                properties:
                  error:
                    type: string
                    const: rate_limit_exceeded
                    description: エラーコード
                  message:
                    type: string
                    description: ユーザー向けメッセージ
                  remaining:
                    type: integer
                    const: 0
                    description: 残回数
                  limit:
                    type: integer
                    description: 本日の上限
                  showAdReward:
                    type: boolean
                    description: 広告視聴フロー用の予約フィールド（現時点で消費者は未実装）
        '502':
          description: AI 判定結果のパースに失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: ai_response_parse_failed
        '503':
          description: AI サービス設定不備
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: gemini_api_key_missing
        default:
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # ログインユーザー向け
  # ============================================================

  /api/me/profile:
    get:
      tags: [User]
      summary: 自身のプロフィール取得
      description: |
        自身のプロフィール情報を返却

        ※ 未認証時は null を返却
      security: []
      responses:
        '200':
          description: 取得成功（未認証時は null）
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'private, no-store'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MyProfile'
                  - type: 'null'
        default:
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [User]
      summary: 自身のプロフィール更新
      description: |
        自身のプロフィールを更新

        ※ ユーザー名・アバター画像 URL のいずれか 1 項目以上の指定が必須
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                username:
                  type: string
                  description: ユーザー名
                avatar_url:
                  type: string
                  nullable: true
                  maxLength: 2048
                  description: アバター画像 URL
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidJson: { value: { error: invalid_json } }
                invalidInput: { value: { error: invalid_input } }
                invalidUsername: { value: { error: invalid_username } }
                nothingToUpdate: { value: { error: nothing_to_update } }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: ユーザー名重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: username_taken
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/me/bookmarks:
    get:
      tags: [User]
      summary: 自身のブックマーク一覧取得
      description: 自身がブックマークしたスポット一覧を返却
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'private, no-store'
          content:
            application/json:
              schema:
                type: object
                required: [bookmarks]
                properties:
                  bookmarks:
                    type: array
                    description: ブックマーク一覧
                    items:
                      $ref: '#/components/schemas/BookmarkListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/bookmarks:
    post:
      tags: [User]
      summary: ブックマーク追加
      description: |
        指定スポットを自身のブックマークに追加

        ※ 既にブックマーク済みの場合も成功を返却（冪等）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [spot_id]
              properties:
                spot_id:
                  allOf:
                    - $ref: '#/components/schemas/UUID'
                  description: 対象スポット ID
      responses:
        '200':
          description: 追加成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, spot_id]
                properties:
                  ok:
                    type: boolean
                    const: true
                    description: 成功フラグ
                  spot_id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: 対象スポット ID
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidJson: { value: { error: invalid_json } }
                invalidSpotId: { value: { error: invalid_spot_id } }
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/bookmarks/{spot_id}:
    get:
      tags: [User]
      summary: 特定スポットのブックマーク状態確認
      description: |
        指定スポットのブックマーク状態を返却

        ※ 未認証時は認証状態・ブックマーク状態ともに false を返却
      security: []
      parameters:
        - $ref: '#/components/parameters/SpotIdPathQ'
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'private, no-store'
          content:
            application/json:
              schema:
                type: object
                required: [isAuthenticated, bookmarked]
                properties:
                  isAuthenticated:
                    type: boolean
                    description: 認証状態
                  bookmarked:
                    type: boolean
                    description: ブックマーク状態
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_spot_id
        default:
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [User]
      summary: ブックマーク削除
      description: |
        指定スポットを自身のブックマークから削除

        ※ 既に削除済みの場合も成功を返却（冪等）
      parameters:
        - $ref: '#/components/parameters/SpotIdPathQ'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, spot_id]
                properties:
                  ok:
                    type: boolean
                    const: true
                    description: 成功フラグ
                  spot_id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: 対象スポット ID
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_spot_id
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/reviews:
    post:
      tags: [User]
      summary: レビュー投稿
      description: |
        指定スポットへのレビューを投稿

        ※ 同一スポットへの既存レビューがある場合は上書き<br>
        ※ コメントは NG ワードでフィルタ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateInput'
      responses:
        '200':
          description: 投稿成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, spot_id]
                properties:
                  ok:
                    type: boolean
                    const: true
                    description: 成功フラグ
                  spot_id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: 対象スポット ID
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidJson: { value: { error: invalid_json } }
                invalidRating: { value: { error: invalid_rating } }
                invalidComment: { value: { error: invalid_comment } }
                invalidVisitedAt: { value: { error: invalid_visited_at } }
                ngWord: { value: { error: ng_word } }
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/reviews/{id}:
    patch:
      tags: [User]
      summary: 自身のレビュー編集
      description: |
        レビューの評価点・コメント・訪問日を部分更新

        ※ 自身のアクティブなレビューのみ編集可能
      parameters:
        - $ref: '#/components/parameters/ReviewIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdateInput'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok:
                    type: boolean
                    const: true
                    description: 成功フラグ
                  id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: レビュー ID
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidJson: { value: { error: invalid_json } }
                invalidId: { value: { error: invalid_id } }
                ngWord: { value: { error: ng_word } }
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [User]
      summary: 自身のレビュー削除
      description: |
        指定レビューを削除

        ※ 自身のアクティブなレビューのみ削除可能（冪等）
      parameters:
        - $ref: '#/components/parameters/ReviewIdPath'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok:
                    type: boolean
                    const: true
                    description: 成功フラグ
                  id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: レビュー ID
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_id
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/me/reviews/by-spot/{spot_id}:
    get:
      tags: [User]
      summary: 特定スポットへの自身のレビュー取得
      description: |
        指定スポットへの自身のレビューを返却

        ※ 未認証時は認証状態 false・レビュー null を返却<br>
        ※ レビュー未投稿時はレビュー null を返却
      security: []
      parameters:
        - $ref: '#/components/parameters/SpotIdPathQ'
      responses:
        '200':
          description: 取得成功
          headers:
            Cache-Control:
              schema:
                type: string
                example: 'private, no-store'
          content:
            application/json:
              schema:
                type: object
                required: [isAuthenticated, review]
                properties:
                  isAuthenticated:
                    type: boolean
                    description: 認証状態
                  review:
                    oneOf:
                      - $ref: '#/components/schemas/MyReviewForSpot'
                      - type: 'null'
                    description: 自身のレビュー（未投稿・未認証時は null）
        '400':
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_spot_id
        default:
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # 管理者向け
  # ============================================================

  /api/admin/spots:
    get:
      tags: [Admin]
      summary: スポット一覧取得
      description: |
        フィルタ条件に合致するスポット一覧を返却

        ※ 未公開・削除済みも含む
      parameters:
        - name: status
          in: query
          description: 公開状態フィルタ
          schema:
            type: string
            enum: [published, unpublished, all]
        - name: prefecture
          in: query
          description: 都道府県 ID
          schema:
            type: integer
            minimum: 1
            maximum: 47
        - name: q
          in: query
          description: 検索キーワード（スポット名・所在地）
          schema:
            type: string
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    description: スポット一覧
                    items:
                      $ref: '#/components/schemas/AdminSpot'
        '302':
          $ref: '#/components/responses/AdminRedirect'
        default:
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Admin]
      summary: スポット新規作成
      description: |
        スポットを新規登録

        ※ 公式サイト URL 未指定時は情報出典が必須
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSpotCreateInput'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    allOf:
                      - $ref: '#/components/schemas/UUID'
                    description: 作成されたスポット ID
        '400':
          $ref: '#/components/responses/BadRequest'
        '302':
          $ref: '#/components/responses/AdminRedirect'
        '403':
          $ref: '#/components/responses/GuestReadOnly'
        default:
          $ref: '#/components/responses/InternalServerError'

  /api/admin/spots/{id}:
    get:
      tags: [Admin]
      summary: スポット詳細取得
      description: |
        指定スポットの詳細情報（スポット画像・花構成を含む）を返却

        ※ 未公開・削除済みも含めて取得可能
      parameters:
        - $ref: '#/components/parameters/SpotIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [spot]
                properties:
                  spot:
                    $ref: '#/components/schemas/AdminSpotDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Admin]
      summary: スポット更新
      description: |
        指定スポットを更新

        ※ 公開状態のみを送信すると公開フラグの切替として動作<br>
        ※ 全項目を送信するとスポット全体を上書き更新
      parameters:
        - $ref: '#/components/parameters/SpotIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AdminSpotTogglePublishedInput'
                - $ref: '#/components/schemas/AdminSpotUpdateInput'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '302':
