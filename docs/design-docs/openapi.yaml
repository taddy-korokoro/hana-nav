      required: [id, spotId, createdAt, isDeleted]
      properties:
        id:
          allOf: [$ref: '#/components/schemas/UUID']
          description: ブックマーク ID
        spotId:
          allOf: [$ref: '#/components/schemas/UUID']
          description: 対象スポット ID
        spotName:
          type: string
          nullable: true
          description: 対象スポット名
        createdAt:
          type: string
          format: date-time
          description: ブックマーク日時
        isDeleted:
          type: boolean
          description: 削除フラグ

    AdminUserAiUsageRow:
      type: object
      description: 管理用ユーザー詳細内の AI 利用ログ行
      required: [id, usedAt, rewardUnlocked, isAnonymous]
      properties:
        id:
          allOf: [$ref: '#/components/schemas/UUID']
          description: 利用ログ ID
        usedAt:
          type: string
          format: date-time
          description: 利用日時
        rewardUnlocked:
          type: boolean
          description: 報酬解放フラグ
        isAnonymous:
          type: boolean
          description: 匿名ユーザー利用フラグ

    # ---------- 管理者: レビュー ----------
    AdminReview:
      type: object
      description: 管理用レビュー一覧項目
      required: [id, rating, spotId, userId, createdAt]
      properties:
        id:
          allOf: [$ref: '#/components/schemas/UUID']
          description: レビュー ID
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: 評価点
        comment:
          type: string
          nullable: true
          description: コメント
        visitedAt:
          type: string
          format: date
          nullable: true
          description: 訪問日
        containsNgWord:
          type: boolean
          description: NG ワード検知フラグ
        spotId:
          allOf: [$ref: '#/components/schemas/UUID']
          description: 対象スポット ID
        spotName:
          type: string
          description: 対象スポット名
        userId:
          allOf: [$ref: '#/components/schemas/UUID']
          description: 投稿者 ID
        username:
          type: string
          nullable: true
          description: 投稿者名
        createdAt:
          type: string
          format: date-time
          description: 投稿日時
        updatedAt:
          type: string
          format: date-time
          description: 更新日時
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: 削除日時

    # ---------- 管理者: AI 利用状況 ----------
    AiUsageStats:
      type: object
      description: AI 利用状況の集計
      required: [daily, monthly, ranking, summary]
      properties:
        daily:
          type: array
          description: 直近 30 日の日別集計
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
                format: date
                description: 対象日
              count:
                type: integer
                minimum: 0
                description: 利用回数
        monthly:
          type: array
          description: 直近 6 ヶ月の月別集計
          items:
            type: object
            required: [month, count]
            properties:
              month:
                type: string
                description: 対象月（YYYY-MM）
                example: '2026-07'
              count:
                type: integer
                minimum: 0
                description: 利用回数
        ranking:
          type: array
          description: 利用ランキング（認証済みユーザー上位 20 名）
          items:
            type: object
            required: [user_id, count]
            properties:
              user_id:
                allOf: [$ref: '#/components/schemas/UUID']
                description: ユーザー ID
              username:
                type: string
                nullable: true
                description: ユーザー名
              count:
                type: integer
                minimum: 0
                description: 利用回数
        summary:
          type: object
          description: サマリー
          required: [7d, 30d, current_month, estimated_cost]
          properties:
            '7d':
              type: integer
              minimum: 0
              description: 直近 7 日の合計利用回数
            '30d':
              type: integer
              minimum: 0
              description: 直近 30 日の合計利用回数
            current_month:
              type: integer
              minimum: 0
              description: 今月の合計利用回数
            estimated_cost:
              type: number
              description: 推計コスト（円）
