      parameters:
        - $ref: '#/components/parameters/FlowerIdPath'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '302':
          $ref: '#/components/responses/AdminRedirect'
        '403':
          $ref: '#/components/responses/GuestReadOnly'
